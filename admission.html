<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Online Admission | Munna ICT Care</title>

    <link rel="stylesheet" href="css/admission.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

<header class="top-header">

    <a href="index.html" class="back-btn">
        <i class="fas fa-arrow-left"></i> Home
    </a>

    <h1>Munna ICT Care</h1>

    <p>Professional Online Admission Form</p>

</header>


<div class="container">

<form id="admissionForm">

<h2>Student Information</h2>

<div class="row">

<div class="input-box">

<label>Full Name</label>

<input type="text"
id="name"
placeholder="Enter Full Name"
required>

</div>

<div class="input-box">

<label>Father's Name</label>

<input type="text"
id="father"
required>

</div>

<div class="input-box">

<label>Mother's Name</label>

<input type="text"
id="mother"
required>

</div>

<div class="input-box">

<label>Date of Birth</label>

<input type="date"
id="dob"
required>

</div>

<div class="input-box">

<label>Gender</label>

<select id="gender">

<option>Male</option>

<option>Female</option>

<option>Other</option>

</select>

</div>

<div class="input-box">

<label>Blood Group</label>

<select id="blood">

<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>AB+</option>
<option>AB-</option>
<option>O+</option>
<option>O-</option>

</select>

</div>

<div class="input-box">

<label>Mobile Number</label>

<input
type="tel"
id="mobile"
required>

</div>

<div class="input-box">

<label>Email</label>

<input
type="email"
id="email">

</div>

</div>


<h2>Address</h2>

<div class="row">

<div class="input-box">

<label>Present Address</label>

<textarea
id="address"
rows="4"></textarea>

</div>

</div>


<h2>Course Information</h2>

<div class="row">

<div class="input-box">

<label>Select Course</label>

<select id="course">

<option>Web Design</option>

<option>Web Development</option>

<option>Graphic Design</option>

<option>Digital Marketing</option>

<option>Computer Office Application</option>

<option>Basic Computer</option>

<option>Programming in C</option>

</select>

</div>

</div>


<h2>Academic Information</h2>

<div class="row">

<div class="input-box">

<label>SSC GPA</label>

<input
type="text"
id="ssc">

</div>

<div class="input-box">

<label>HSC GPA</label>

<input
type="text"
id="hsc">

</div>

</div>


<h2>Upload Documents</h2>

<div class="row">

<div class="input-box">

<label>Passport Size Photo</label>

<input
type="file"
id="photo"
accept="image/*">

</div>

<div class="input-box">

<label>Signature</label>

<input
type="file"
id="signature"
accept="image/*">

</div>

<div class="input-box">

<label>NID / Birth Certificate</label>

<input
type="file"
id="document">

</div>

</div>


<div class="submit-area">

<button
type="submit">

Submit Admission

</button>

</div>

</form>

</div>

<script src="js/admission.js"></script>
<script type="module" src="js/admission.js"></script>

</body>

</html>
